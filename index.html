<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Enchantment By Design – 3D Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #d8d8d8;
      font-family: system-ui, sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #d8d8d8;
    }

    .brand {
      position: fixed;
      top: 8px;
      left: 12px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #222;
      opacity: 0.75;
      pointer-events: none;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #222;
      opacity: 0.75;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="brand">Enchantment By Design</div>

  <model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    auto-rotate
    interaction-prompt="auto"
    environment-image="legacy"
    exposure="2"
    shadow-intensity="0"
    ar
    ar-modes="scene-viewer webxr quick-look"
    alt="3D model">
  </model-viewer>

  <div class="hint">Drag to rotate · Pinch to zoom</div>

  <script type="module">
    const viewer = document.querySelector("#viewer");

    viewer.addEventListener("load", () => {
      const materials = viewer.model.materials;

      for (const material of materials) {
        material.pbrMetallicRoughness.setBaseColorFactor([0.8, 0.8, 0.8, 1]);
        material.pbrMetallicRoughness.setMetallicFactor(0);
        material.pbrMetallicRoughness.setRoughnessFactor(0.75);
        material.setAlphaMode("OPAQUE");

        // Makes it visible even if lighting/normals are weird.
        if (material.setEmissiveFactor) {
          material.setEmissiveFactor([0.45, 0.45, 0.45]);
        }

        material.doubleSided = true;
      }
    });
  </script>
</body>
</html>
